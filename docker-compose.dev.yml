name: portfolio-dev

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: portfolio_postgres_dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: portfolio_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - portfolio_dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev:/data
    networks:
      - portfolio_dev_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: portfolio_minio_dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_dev:/data
    networks:
      - portfolio_dev_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  portfolio_dev_network:
    driver: bridge

volumes:
  postgres_dev:
  redis_dev:
  minio_dev:
